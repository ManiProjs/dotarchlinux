background {
    monitor =
    path = /usr/share/wallpapers/ScarletTree/contents/images_dark/5120x2880.png

    blur_passes = 3
    blur_size = 8
}

general {
    no_fade_in = false
    grace = 0
}

label {
    monitor =

    text = $TIME
    font_size = 64
    font_family = Sans Bold

    color = rgb(229, 231, 235)

    position = 0, 200
    halign = center
    valign = center
}

label {
    monitor =

    text = Welcome back
    font_size = 18
    font_family = Sans Bold

    color = rgb(229, 231, 235)

    position = 0, 260
    halign = center
    valign = center
}

label {
    monitor =

    text = cmd[update:1000] date "+%a %d %b"
    font_size = 14
    font_family = Sans

    color = rgb(229, 231, 235)

    position = 0, 290
    halign = center
    valign = center
}

input-field {
    monitor =

    size = 320, 60
    rounding = 12

    outer_color = rgb(59, 130, 246)
    inner_color = rgb(30, 35, 42)
    font_color = rgb(229, 231, 235)

    check_color = rgb(34, 197, 94)
    fail_color = rgb(239, 68, 68)

    outline_thickness = 2
    dots_center = true

    fade_on_empty = false
    placeholder_text = Password...
}
